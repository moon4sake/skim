<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <text x="40" y="32" font-size="13" font-weight="500" fill="#666" letter-spacing="0.08em">SPARSITY FRONTIER — HAMMER BFCL-V3 GRAMMAR (PLACEHOLDER)</text>

  <!-- axes -->
  <line x1="90" y1="380" x2="750" y2="380" stroke="#888780" stroke-width="0.5"/>
  <line x1="90" y1="80" x2="90" y2="380" stroke="#888780" stroke-width="0.5"/>

  <!-- x-axis ticks and labels -->
  <g font-size="11" fill="#5F5E5A" text-anchor="middle">
    <line x1="175" y1="380" x2="175" y2="385" stroke="#888780" stroke-width="0.5"/>
    <text x="175" y="402">25%</text>
    <line x1="340" y1="380" x2="340" y2="385" stroke="#888780" stroke-width="0.5"/>
    <text x="340" y="402">35%</text>
    <line x1="505" y1="380" x2="505" y2="385" stroke="#888780" stroke-width="0.5"/>
    <text x="505" y="402">45%</text>
    <line x1="670" y1="380" x2="670" y2="385" stroke="#888780" stroke-width="0.5"/>
    <text x="670" y="402">55%</text>
  </g>
  <text x="420" y="425" text-anchor="middle" font-size="12" fill="#444441">structured sparsity</text>

  <!-- y-axis ticks and labels -->
  <g font-size="11" fill="#5F5E5A" text-anchor="end">
    <line x1="85" y1="380" x2="90" y2="380" stroke="#888780" stroke-width="0.5"/>
    <text x="80" y="384">40</text>
    <line x1="85" y1="320" x2="90" y2="320" stroke="#888780" stroke-width="0.5"/>
    <text x="80" y="324">55</text>
    <line x1="85" y1="260" x2="90" y2="260" stroke="#888780" stroke-width="0.5"/>
    <text x="80" y="264">70</text>
    <line x1="85" y1="200" x2="90" y2="200" stroke="#888780" stroke-width="0.5"/>
    <text x="80" y="204">85</text>
    <line x1="85" y1="140" x2="90" y2="140" stroke="#888780" stroke-width="0.5"/>
    <text x="80" y="144">100</text>
  </g>
  <text x="32" y="230" text-anchor="middle" font-size="12" fill="#444441" transform="rotate(-90, 32, 230)">BFCL grammar full-match</text>

  <!-- gridlines -->
  <line x1="90" y1="320" x2="750" y2="320" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="90" y1="260" x2="750" y2="260" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="90" y1="200" x2="750" y2="200" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="90" y1="140" x2="750" y2="140" stroke="#EDEBE4" stroke-width="0.5"/>

  <!-- SKIM-v5 curve (teal) — flat then graceful degradation -->
  <polyline points="175,172 340,188 505,212 670,256" fill="none" stroke="#0F6E56" stroke-width="2.5"/>
  <g fill="#0F6E56">
    <circle cx="175" cy="172" r="5"/>
    <circle cx="340" cy="188" r="5"/>
    <circle cx="505" cy="212" r="5"/>
    <circle cx="670" cy="256" r="5"/>
  </g>

  <!-- baseline curve (amber/coral) — steeper dropoff -->
  <polyline points="175,180 340,212 505,264 670,328" fill="none" stroke="#D85A30" stroke-width="2"/>
  <g fill="#D85A30">
    <circle cx="175" cy="180" r="4"/>
    <circle cx="340" cy="212" r="4"/>
    <circle cx="505" cy="264" r="4"/>
    <circle cx="670" cy="328" r="4"/>
  </g>

  <!-- dense reference -->
  <line x1="90" y1="148" x2="750" y2="148" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="748" y="142" text-anchor="end" font-size="11" fill="#5F5E5A" font-style="italic">dense model</text>

  <!-- legend -->
  <g>
    <rect x="540" y="90" width="200" height="44" rx="6" fill="#FDFCF7" stroke="#D3D1C7" stroke-width="0.5"/>
    <circle cx="555" cy="104" r="4" fill="#0F6E56"/>
    <text x="566" y="108" font-size="12" fill="#2C2C2A" font-weight="500">SKIM-v5</text>
    <circle cx="555" cy="124" r="4" fill="#D85A30"/>
    <text x="566" y="128" font-size="12" fill="#2C2C2A">prior art baseline</text>
  </g>

  <!-- numeric annotations at 55% to show delta -->
  <text x="690" y="256" font-size="11" fill="#085041" font-weight="500">68.5</text>
  <text x="690" y="328" font-size="11" fill="#993C1D" font-weight="500">55.2</text>

  <text x="40" y="460" font-size="11" fill="#888780" font-style="italic">
    Figure is indicative. SKIM-v5 is expected to match prior art at moderate sparsity (10-25%) and pull ahead at aggressive sparsity (40-60%), where active write-penalty reallocates capacity to the phases xgrammar cannot replace.
  </text>
</svg>
