<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <text x="40" y="32" font-size="13" font-weight="500" fill="#666" letter-spacing="0.08em">NEURON-WISE SCORING</text>

  <text x="40" y="60" font-size="14" fill="#2C2C2A">For each structured unit (MLP neuron or attention group), compute three phase activations</text>
  <text x="40" y="78" font-size="14" fill="#2C2C2A">using forward hooks over the xLAM calibration set:</text>

  <!-- three activation boxes -->
  <g>
    <rect x="40" y="100" width="226" height="88" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="153" y="124" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">sem_rms</text>
    <text x="56" y="148" font-size="12" fill="#042C53">RMS at semantic content</text>
    <text x="56" y="166" font-size="12" fill="#042C53">endpoints in the prompt:</text>
    <text x="56" y="184" font-size="11" fill="#185FA5" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">tool names, descriptions, query</text>
  </g>

  <g>
    <rect x="287" y="100" width="226" height="88" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
    <text x="400" y="124" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">decide_rms</text>
    <text x="303" y="148" font-size="12" fill="#04342C">RMS at decision positions</text>
    <text x="303" y="166" font-size="12" fill="#04342C">in the output, weighted by</text>
    <text x="303" y="184" font-size="11" fill="#0F6E56" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">grammar narrowness φ(t)</text>
  </g>

  <g>
    <rect x="534" y="100" width="226" height="88" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="647" y="124" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">write_rms</text>
    <text x="550" y="148" font-size="12" fill="#444441">RMS at write positions</text>
    <text x="550" y="166" font-size="12" fill="#444441">(all output tokens not in</text>
    <text x="550" y="184" font-size="11" fill="#5F5E5A" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">the decision set)</text>
  </g>

  <line x1="40" y1="214" x2="760" y2="214" stroke="#D3D1C7" stroke-width="0.5"/>

  <text x="40" y="240" font-size="13" font-weight="500" fill="#666" letter-spacing="0.08em">SCORE</text>

  <!-- formula box -->
  <rect x="40" y="258" width="720" height="72" rx="10" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="400" y="300" text-anchor="middle" font-size="18" fill="#2C2C2A" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
    s = |W| · √(w<tspan baseline-shift="sub" font-size="11">s</tspan>² sem_rms² + w<tspan baseline-shift="sub" font-size="11">d</tspan>² decide_rms²) · exp(−w<tspan baseline-shift="sub" font-size="11">w</tspan> · write_rms)
  </text>

  <text x="40" y="356" font-size="13" font-weight="500" fill="#666" letter-spacing="0.08em">READING THE FORMULA</text>

  <text x="40" y="380" font-size="13" fill="#2C2C2A">
    <tspan font-weight="500" fill="#0C447C">sem</tspan> and <tspan font-weight="500" fill="#085041">decide</tspan> terms reward reading comprehension and decision activity.
  </text>
  <text x="40" y="400" font-size="13" fill="#2C2C2A">
    <tspan font-weight="500" fill="#444441">write</tspan> term enters as a multiplicative dampener — neurons that specialize in JSON formatting
  </text>
  <text x="40" y="420" font-size="13" fill="#2C2C2A">
    get their score suppressed, because constrained decoding replaces that function at inference.
  </text>
  <text x="40" y="448" font-size="12" fill="#5F5E5A" font-style="italic">
    Prune the bottom-k scores globally, subject to a per-layer sparsity cap. One-shot.
  </text>
</svg>
