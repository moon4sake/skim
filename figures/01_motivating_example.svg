<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-motiv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="40" y="32" font-size="13" font-weight="500" fill="#666" letter-spacing="0.08em">ONE TOOL-CALLING SAMPLE</text>

  <rect x="40" y="48" width="720" height="90" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="56" y="72" font-size="13" fill="#0C447C" font-weight="500">Prompt (reading phase)</text>
  <text x="56" y="94" font-size="12" fill="#042C53" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">System: You are a tool-calling assistant.</text>
  <text x="56" y="110" font-size="12" fill="#042C53" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">Tools: [{"name": "get_weather", ...}, {"name": "get_forecast", ...}]</text>
  <text x="56" y="126" font-size="12" fill="#042C53" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">User: What's the weather in Seoul?</text>

  <text x="40" y="170" font-size="13" font-weight="500" fill="#666" letter-spacing="0.08em">OUTPUT TOKENS — PHASE-LABELED</text>

  <!-- write tokens (gray) -->
  <g fill="#F1EFE8" stroke="#888780" stroke-width="0.5">
    <rect x="40" y="188" width="42" height="30" rx="4"/>
    <rect x="86" y="188" width="58" height="30" rx="4"/>
    <rect x="148" y="188" width="30" height="30" rx="4"/>
  </g>
  <text x="61" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">[{"</text>
  <text x="115" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">name</text>
  <text x="163" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">":"</text>

  <!-- decision: get_weather (teal) -->
  <rect x="182" y="188" width="130" height="30" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="247" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#04342C" font-weight="500">get_weather</text>

  <!-- more write (gray) -->
  <g fill="#F1EFE8" stroke="#888780" stroke-width="0.5">
    <rect x="316" y="188" width="42" height="30" rx="4"/>
    <rect x="362" y="188" width="102" height="30" rx="4"/>
    <rect x="468" y="188" width="42" height="30" rx="4"/>
    <rect x="514" y="188" width="50" height="30" rx="4"/>
    <rect x="568" y="188" width="30" height="30" rx="4"/>
  </g>
  <text x="337" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">","</text>
  <text x="413" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">arguments</text>
  <text x="489" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">":{"</text>
  <text x="539" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">city</text>
  <text x="583" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">":"</text>

  <!-- decision: Seoul (teal) -->
  <rect x="602" y="188" width="76" height="30" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="640" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#04342C" font-weight="500">Seoul</text>

  <rect x="682" y="188" width="78" height="30" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="721" y="207" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" fill="#444441">"}}]</text>

  <!-- phase labels under each segment -->
  <text x="115" y="236" text-anchor="middle" font-size="11" fill="#5F5E5A">write</text>
  <text x="247" y="236" text-anchor="middle" font-size="11" fill="#085041" font-weight="500">decide</text>
  <text x="490" y="236" text-anchor="middle" font-size="11" fill="#5F5E5A">write</text>
  <text x="640" y="236" text-anchor="middle" font-size="11" fill="#085041" font-weight="500">decide</text>
  <text x="721" y="236" text-anchor="middle" font-size="11" fill="#5F5E5A">write</text>

  <line x1="40" y1="264" x2="760" y2="264" stroke="#D3D1C7" stroke-width="0.5"/>

  <text x="40" y="288" font-size="13" font-weight="500" fill="#666" letter-spacing="0.08em">WHAT EACH PHASE COSTS UNDER CONSTRAINED DECODING</text>

  <!-- three columns: reading, deciding, writing -->
  <g>
    <rect x="40" y="308" width="226" height="108" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="153" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Reading</text>
    <text x="56" y="354" font-size="12" fill="#042C53">Comprehending tool schemas</text>
    <text x="56" y="372" font-size="12" fill="#042C53">and user query. Grammar</text>
    <text x="56" y="390" font-size="12" fill="#042C53">cannot replace this — model</text>
    <text x="56" y="408" font-size="12" fill="#042C53" font-weight="500">must preserve.</text>
  </g>

  <g>
    <rect x="287" y="308" width="226" height="108" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
    <text x="400" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Deciding</text>
    <text x="303" y="354" font-size="12" fill="#04342C">Choosing tool, choosing</text>
    <text x="303" y="372" font-size="12" fill="#04342C">argument values. Grammar</text>
    <text x="303" y="390" font-size="12" fill="#04342C">narrows options but model</text>
    <text x="303" y="408" font-size="12" fill="#04342C" font-weight="500">picks the right one.</text>
  </g>

  <g>
    <rect x="534" y="308" width="226" height="108" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="647" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Writing</text>
    <text x="550" y="354" font-size="12" fill="#444441">Emitting JSON structure:</text>
    <text x="550" y="372" font-size="12" fill="#444441">braces, commas, keys.</text>
    <text x="550" y="390" font-size="12" fill="#444441">Grammar handles this at</text>
    <text x="550" y="408" font-size="12" fill="#444441" font-weight="500">inference — prunable.</text>
  </g>
</svg>
