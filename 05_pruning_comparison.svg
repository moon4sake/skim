<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <text x="40" y="28" font-size="14" font-weight="600" fill="#2C2C2A">Six example structured units, activation by token type</text>

  <!-- Column headers -->
  <text x="40" y="64" font-size="12" font-weight="600" fill="#444441">unit</text>
  <text x="100" y="64" font-size="12" font-weight="600" fill="#0C447C">Reading</text>
  <text x="300" y="64" font-size="12" font-weight="600" fill="#085041">Deciding</text>
  <text x="500" y="64" font-size="12" font-weight="600" fill="#633806">Writing</text>
  <text x="750" y="64" font-size="12" font-weight="600" fill="#444441" text-anchor="middle">Baseline</text>
  <text x="820" y="64" font-size="12" font-weight="600" fill="#444441" text-anchor="middle">SKIM</text>

  <line x1="40" y1="72" x2="850" y2="72" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Bar tracks: reading x=100..270, deciding x=300..470, writing x=500..670. Verdict pills at x=720 and x=790 (60wide). -->

  <!-- U1: reads a lot, decides moderate, writes none -->
  <g>
    <text x="56" y="98" font-size="12" fill="#444441" font-weight="500">U1</text>
    <rect x="100" y="88" width="140" height="20" rx="4" fill="#DAEBFA" stroke="#378ADD" stroke-width="0.5"/>
    <rect x="300" y="88" width="100" height="20" rx="4" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
    <rect x="500" y="88" width="18" height="20" rx="4" fill="#FCE5BF" stroke="#854F0B" stroke-width="0.5"/>
    <rect x="720" y="86" width="60" height="24" rx="6" fill="#D8F0E3" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="750" y="102" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">keep</text>
    <rect x="790" y="86" width="60" height="24" rx="6" fill="#D8F0E3" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="820" y="102" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">keep</text>
  </g>

  <!-- U2: barely reads, decides a lot, writes none. Baseline prunes, SKIM keeps. -->
  <g>
    <text x="56" y="134" font-size="12" fill="#444441" font-weight="500">U2</text>
    <rect x="100" y="124" width="20" height="20" rx="4" fill="#DAEBFA" stroke="#378ADD" stroke-width="0.5"/>
    <rect x="300" y="124" width="150" height="20" rx="4" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
    <rect x="500" y="124" width="16" height="20" rx="4" fill="#FCE5BF" stroke="#854F0B" stroke-width="0.5"/>
    <rect x="720" y="122" width="60" height="24" rx="6" fill="#FBE1DA" stroke="#C82020" stroke-width="0.5"/>
    <text x="750" y="138" text-anchor="middle" font-size="12" fill="#933030" font-weight="600">prune</text>
    <rect x="790" y="122" width="60" height="24" rx="6" fill="#D8F0E3" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="820" y="138" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">keep</text>
  </g>

  <!-- U3: reads a lot, decides small, writes none -->
  <g>
    <text x="56" y="170" font-size="12" fill="#444441" font-weight="500">U3</text>
    <rect x="100" y="160" width="120" height="20" rx="4" fill="#DAEBFA" stroke="#378ADD" stroke-width="0.5"/>
    <rect x="300" y="160" width="36" height="20" rx="4" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
    <rect x="500" y="160" width="18" height="20" rx="4" fill="#FCE5BF" stroke="#854F0B" stroke-width="0.5"/>
    <rect x="720" y="158" width="60" height="24" rx="6" fill="#D8F0E3" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="750" y="174" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">keep</text>
    <rect x="790" y="158" width="60" height="24" rx="6" fill="#D8F0E3" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="820" y="174" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">keep</text>
  </g>

  <!-- U4: barely reads, barely decides, writes a LOT. Baseline keeps, SKIM prunes. CENTRAL CASE. -->
  <g>
    <text x="56" y="206" font-size="12" fill="#444441" font-weight="500">U4</text>
    <rect x="100" y="196" width="20" height="20" rx="4" fill="#DAEBFA" stroke="#378ADD" stroke-width="0.5"/>
    <rect x="300" y="196" width="22" height="20" rx="4" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
    <!-- Writing bar max safe width: 170px so endpoint is x=670, well clear of verdict at x=720 -->
    <rect x="500" y="196" width="160" height="20" rx="4" fill="#FCE5BF" stroke="#854F0B" stroke-width="0.5"/>
    <rect x="720" y="194" width="60" height="24" rx="6" fill="#D8F0E3" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="750" y="210" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">keep</text>
    <rect x="790" y="194" width="60" height="24" rx="6" fill="#FBE1DA" stroke="#C82020" stroke-width="0.5"/>
    <text x="820" y="210" text-anchor="middle" font-size="12" fill="#933030" font-weight="600">prune</text>
  </g>

  <!-- U5: reads moderate, decides small, writes a lot. Baseline keeps, SKIM prunes. -->
  <g>
    <text x="56" y="242" font-size="12" fill="#444441" font-weight="500">U5</text>
    <rect x="100" y="232" width="44" height="20" rx="4" fill="#DAEBFA" stroke="#378ADD" stroke-width="0.5"/>
    <rect x="300" y="232" width="28" height="20" rx="4" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
    <rect x="500" y="232" width="120" height="20" rx="4" fill="#FCE5BF" stroke="#854F0B" stroke-width="0.5"/>
    <rect x="720" y="230" width="60" height="24" rx="6" fill="#D8F0E3" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="750" y="246" text-anchor="middle" font-size="12" fill="#085041" font-weight="600">keep</text>
    <rect x="790" y="230" width="60" height="24" rx="6" fill="#FBE1DA" stroke="#C82020" stroke-width="0.5"/>
    <text x="820" y="246" text-anchor="middle" font-size="12" fill="#933030" font-weight="600">prune</text>
  </g>

  <!-- U6: dead everywhere. Both prune. -->
  <g>
    <text x="56" y="278" font-size="12" fill="#444441" font-weight="500">U6</text>
    <rect x="100" y="268" width="16" height="20" rx="4" fill="#DAEBFA" stroke="#378ADD" stroke-width="0.5"/>
    <rect x="300" y="268" width="18" height="20" rx="4" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
    <rect x="500" y="268" width="14" height="20" rx="4" fill="#FCE5BF" stroke="#854F0B" stroke-width="0.5"/>
    <rect x="720" y="266" width="60" height="24" rx="6" fill="#FBE1DA" stroke="#C82020" stroke-width="0.5"/>
    <text x="750" y="282" text-anchor="middle" font-size="12" fill="#933030" font-weight="600">prune</text>
    <rect x="790" y="266" width="60" height="24" rx="6" fill="#FBE1DA" stroke="#C82020" stroke-width="0.5"/>
    <text x="820" y="282" text-anchor="middle" font-size="12" fill="#933030" font-weight="600">prune</text>
  </g>

  <line x1="40" y1="314" x2="850" y2="314" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- INTERPRETATION: two compact boxes -->
  <rect x="40" y="332" width="395" height="184" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="60" y="358" font-size="13" font-weight="600" fill="#085041">SKIM disagrees with baseline on:</text>
  <text x="60" y="386" font-size="12" fill="#2C2C2A"><tspan font-weight="600">U2</tspan> — decides but doesn't read.</text>
  <text x="60" y="404" font-size="12" fill="#5F5E5A">Baseline prunes (low total), SKIM keeps.</text>
  <text x="60" y="434" font-size="12" fill="#2C2C2A"><tspan font-weight="600">U4, U5</tspan> — writing specialists.</text>
  <text x="60" y="452" font-size="12" fill="#5F5E5A">Baseline keeps (high total), SKIM prunes.</text>
  <text x="60" y="486" font-size="11" fill="#085041" font-style="italic">Disagreement on U4 is where SKIM wins:</text>
  <text x="60" y="502" font-size="11" fill="#085041" font-style="italic">structured generation replaces its function.</text>

  <rect x="455" y="332" width="395" height="184" rx="10" fill="#FDFCF7" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="475" y="358" font-size="13" font-weight="600" fill="#2C2C2A">SKIM agrees with baseline on:</text>
  <text x="475" y="386" font-size="12" fill="#2C2C2A"><tspan font-weight="600">U1, U3</tspan> — active in reading and deciding.</text>
  <text x="475" y="404" font-size="12" fill="#5F5E5A">Both keep — these do genuine task work.</text>
  <text x="475" y="434" font-size="12" fill="#2C2C2A"><tspan font-weight="600">U6</tspan> — inactive everywhere.</text>
  <text x="475" y="452" font-size="12" fill="#5F5E5A">Both prune — dead unit, no loss.</text>
  <text x="475" y="486" font-size="11" fill="#5F5E5A" font-style="italic">Agreement on extreme cases; disagreement</text>
  <text x="475" y="502" font-size="11" fill="#5F5E5A" font-style="italic">lives in the middle of the distribution.</text>

</svg>
