<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <text x="40" y="28" font-size="14" font-weight="600" fill="#2C2C2A">SKIM vs LLM-Pruner on Hammer-3B, 25% structured sparsity</text>
  <text x="40" y="46" font-size="12" fill="#5F5E5A">Per group: F bar (free) on left, G bar (grammar) on right. SKIM post-KD reaches .850 on BFCL.</text>

  <!-- ===== LEFT PANEL: BFCL-v3 ===== -->
  <text x="80" y="82" font-size="13" font-weight="600" fill="#2C2C2A">BFCL-v3</text>
  <line x1="110" y1="90" x2="110" y2="300" stroke="#888780" stroke-width="0.5"/>
  <line x1="110" y1="300" x2="440" y2="300" stroke="#888780" stroke-width="0.5"/>

  <g font-size="10" fill="#5F5E5A" text-anchor="end">
    <line x1="106" y1="300" x2="110" y2="300" stroke="#888780" stroke-width="0.5"/>
    <text x="102" y="304">0.0</text>
    <line x1="106" y1="247.5" x2="110" y2="247.5" stroke="#888780" stroke-width="0.5"/>
    <text x="102" y="251.5">0.25</text>
    <line x1="106" y1="195" x2="110" y2="195" stroke="#888780" stroke-width="0.5"/>
    <text x="102" y="199">0.50</text>
    <line x1="106" y1="142.5" x2="110" y2="142.5" stroke="#888780" stroke-width="0.5"/>
    <text x="102" y="146.5">0.75</text>
    <line x1="106" y1="90" x2="110" y2="90" stroke="#888780" stroke-width="0.5"/>
    <text x="102" y="94">1.00</text>
  </g>

  <line x1="110" y1="247.5" x2="440" y2="247.5" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="110" y1="195" x2="440" y2="195" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="110" y1="142.5" x2="440" y2="142.5" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="110" y1="90" x2="440" y2="90" stroke="#EDEBE4" stroke-width="0.5"/>

  <!-- 5 groups at centers 140, 210, 280, 350, 420.
       F at center-16..center-2, G at center..center+14. -->

  <!-- Group 1: Dense | F=.799 (168), G=.894 (188) -->
  <rect x="124" y="132" width="14" height="168" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <rect x="140" y="112" width="14" height="188" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
  <text x="147" y="106" text-anchor="middle" font-size="9" fill="#0C447C" font-weight="600">.799 / .894</text>

  <!-- Group 2: LLM-P pre-KD | F=.558 (117), G=.714 (150) -->
  <rect x="194" y="183" width="14" height="117" fill="#E8E6DE" stroke="#444441" stroke-width="0.5"/>
  <rect x="210" y="150" width="14" height="150" fill="#B4B2A9" stroke="#444441" stroke-width="0.5"/>
  <text x="217" y="144" text-anchor="middle" font-size="9" fill="#444441" font-weight="600">.558 / .714</text>

  <!-- Group 3: LLM-P post-KD | F=.745 (156), G=.772 (162) -->
  <rect x="264" y="144" width="14" height="156" fill="#E8E6DE" stroke="#444441" stroke-width="0.5"/>
  <rect x="280" y="138" width="14" height="162" fill="#B4B2A9" stroke="#444441" stroke-width="0.5"/>
  <text x="287" y="132" text-anchor="middle" font-size="9" fill="#444441" font-weight="600">.745 / .772</text>

  <!-- Group 4: SKIM pre-KD | F=.261 (55), G=.790 (166) -->
  <rect x="334" y="245" width="14" height="55" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="350" y="134" width="14" height="166" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="357" y="128" text-anchor="middle" font-size="9" fill="#0F6E56" font-weight="600">.261 / .790</text>

  <!-- Group 5: SKIM post-KD (headline) | F=.133 (28), G=.850 (179) -->
  <rect x="404" y="272" width="14" height="28" fill="#9FE1CB" stroke="#064334" stroke-width="0.8"/>
  <rect x="420" y="121" width="14" height="179" fill="#0F6E56" stroke="#064334" stroke-width="0.8"/>
  <text x="427" y="115" text-anchor="middle" font-size="9" fill="#064334" font-weight="700">.133 / .850</text>

  <g font-size="10" fill="#2C2C2A">
    <text x="147" y="314" text-anchor="end" transform="rotate(-45 147 314)">Dense</text>
    <text x="217" y="314" text-anchor="end" transform="rotate(-45 217 314)">LLM-P pre-KD</text>
    <text x="287" y="314" text-anchor="end" transform="rotate(-45 287 314)">LLM-P post-KD</text>
  </g>
  <g font-size="10" fill="#085041">
    <text x="357" y="314" text-anchor="end" transform="rotate(-45 357 314)">SKIM pre-KD</text>
  </g>
  <g font-size="10" fill="#064334" font-weight="700">
    <text x="427" y="314" text-anchor="end" transform="rotate(-45 427 314)">SKIM post-KD</text>
  </g>

  <!-- ===== RIGHT PANEL: API-Bank L1 ===== -->
  <text x="500" y="82" font-size="13" font-weight="600" fill="#2C2C2A">API-Bank L1</text>
  <line x1="530" y1="90" x2="530" y2="300" stroke="#888780" stroke-width="0.5"/>
  <line x1="530" y1="300" x2="860" y2="300" stroke="#888780" stroke-width="0.5"/>

  <g font-size="10" fill="#5F5E5A" text-anchor="end">
    <line x1="526" y1="300" x2="530" y2="300" stroke="#888780" stroke-width="0.5"/>
    <text x="522" y="304">0.0</text>
    <line x1="526" y1="247.5" x2="530" y2="247.5" stroke="#888780" stroke-width="0.5"/>
    <text x="522" y="251.5">0.25</text>
    <line x1="526" y1="195" x2="530" y2="195" stroke="#888780" stroke-width="0.5"/>
    <text x="522" y="199">0.50</text>
    <line x1="526" y1="142.5" x2="530" y2="142.5" stroke="#888780" stroke-width="0.5"/>
    <text x="522" y="146.5">0.75</text>
    <line x1="526" y1="90" x2="530" y2="90" stroke="#888780" stroke-width="0.5"/>
    <text x="522" y="94">1.00</text>
  </g>

  <line x1="530" y1="247.5" x2="860" y2="247.5" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="530" y1="195" x2="860" y2="195" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="530" y1="142.5" x2="860" y2="142.5" stroke="#EDEBE4" stroke-width="0.5"/>
  <line x1="530" y1="90" x2="860" y2="90" stroke="#EDEBE4" stroke-width="0.5"/>

  <!-- Group 1: Dense | F=.759 (159), G=.762 (160) -->
  <rect x="544" y="141" width="14" height="159" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <rect x="560" y="140" width="14" height="160" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
  <text x="567" y="134" text-anchor="middle" font-size="9" fill="#0C447C" font-weight="600">.759 / .762</text>

  <!-- Group 2: LLM-P pre-KD | F=.283 (59), G=.596 (125) -->
  <rect x="614" y="241" width="14" height="59" fill="#E8E6DE" stroke="#444441" stroke-width="0.5"/>
  <rect x="630" y="175" width="14" height="125" fill="#B4B2A9" stroke="#444441" stroke-width="0.5"/>
  <text x="637" y="169" text-anchor="middle" font-size="9" fill="#444441" font-weight="600">.283 / .596</text>

  <!-- Group 3: LLM-P post-KD | F=.534 (112), G=.652 (137) -->
  <rect x="684" y="188" width="14" height="112" fill="#E8E6DE" stroke="#444441" stroke-width="0.5"/>
  <rect x="700" y="163" width="14" height="137" fill="#B4B2A9" stroke="#444441" stroke-width="0.5"/>
  <text x="707" y="157" text-anchor="middle" font-size="9" fill="#444441" font-weight="600">.534 / .652</text>

  <!-- Group 4: SKIM pre-KD | F=.246 (52), G=.674 (142) -->
  <rect x="754" y="248" width="14" height="52" fill="#CFEFE1" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="770" y="158" width="14" height="142" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="777" y="152" text-anchor="middle" font-size="9" fill="#0F6E56" font-weight="600">.246 / .674</text>

  <!-- Group 5: SKIM post-KD | F=.143 (30), G=.702 (147) -->
  <rect x="824" y="270" width="14" height="30" fill="#9FE1CB" stroke="#064334" stroke-width="0.8"/>
  <rect x="840" y="153" width="14" height="147" fill="#0F6E56" stroke="#064334" stroke-width="0.8"/>
  <text x="847" y="147" text-anchor="middle" font-size="9" fill="#064334" font-weight="700">.143 / .702</text>

  <g font-size="10" fill="#2C2C2A">
    <text x="567" y="314" text-anchor="end" transform="rotate(-45 567 314)">Dense</text>
    <text x="637" y="314" text-anchor="end" transform="rotate(-45 637 314)">LLM-P pre-KD</text>
    <text x="707" y="314" text-anchor="end" transform="rotate(-45 707 314)">LLM-P post-KD</text>
  </g>
  <g font-size="10" fill="#085041">
    <text x="777" y="314" text-anchor="end" transform="rotate(-45 777 314)">SKIM pre-KD</text>
  </g>
  <g font-size="10" fill="#064334" font-weight="700">
    <text x="847" y="314" text-anchor="end" transform="rotate(-45 847 314)">SKIM post-KD</text>
  </g>

  <!-- Legend -->
  <line x1="40" y1="410" x2="860" y2="410" stroke="#D3D1C7" stroke-width="0.5"/>
  <g transform="translate(220, 430)">
    <rect x="0" y="-9" width="12" height="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.4"/>
    <rect x="13" y="-9" width="12" height="10" fill="#378ADD" stroke="#185FA5" stroke-width="0.4"/>
    <text x="32" y="0" font-size="11" fill="#0C447C">Dense (F / G)</text>

    <rect x="140" y="-9" width="12" height="10" fill="#E8E6DE" stroke="#444441" stroke-width="0.4"/>
    <rect x="153" y="-9" width="12" height="10" fill="#B4B2A9" stroke="#444441" stroke-width="0.4"/>
    <text x="172" y="0" font-size="11" fill="#444441">LLM-Pruner (F / G)</text>

    <rect x="310" y="-9" width="12" height="10" fill="#9FE1CB" stroke="#064334" stroke-width="0.4"/>
    <rect x="323" y="-9" width="12" height="10" fill="#0F6E56" stroke="#064334" stroke-width="0.4"/>
    <text x="342" y="0" font-size="11" fill="#064334" font-weight="600">SKIM (F / G)</text>
  </g>

</svg>
